name: ReconForge CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Lint & Import checks ────────────────────────────────────────────────────
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes

      - name: Check for syntax errors
        run: python -m pyflakes reconforge/ || true

      - name: Verify all imports resolve
        run: |
          python -c "
          from reconforge import __version__
          from reconforge.modules.catalog import MODULES, list_categories
          from reconforge.utils.deps import check_dependencies
          from reconforge.cli import build_parser, parse_custom_ports
          from reconforge.core.recon_engine import ReconEngine
          from reconforge.core.network_scanner import NetworkScanner
          from reconforge.core.port_scanner import PortScanner
          from reconforge.core.vuln_engine import VulnEngine
          from reconforge.core.report_builder import ReportBuilder
          from reconforge.core.msf_runner import MSFRunner
          from reconforge.core.device_info import collect_device_info
          print(f'  All imports OK — ReconForge {__version__}')
          print(f'  {len(MODULES)} modules in catalogue')
          print(f'  {len(list_categories())} categories')
          "

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (nmap)
        run: sudo apt-get update && sudo apt-get install -y nmap

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=reconforge --cov-report=term-missing

      - name: Verify CLI entry point works
        run: reconforge --version && reconforge --list-categories

  # ── Install script smoke test ───────────────────────────────────────────────
  install-script:
    name: install.sh smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Run installer (non-root mode)
        run: |
          chmod +x install.sh
          # Run without sudo — will skip apt but test venv + pip install
          bash install.sh || true

      - name: Verify reconforge runs after install
        run: |
          source ~/.reconforge-venv/bin/activate
          reconforge --version
          reconforge --check-deps
          reconforge --list-modules | head -5

  # ── pip install from source ─────────────────────────────────────────────────
  pip-install:
    name: pip install . smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: pip install
        run: |
          pip install -r requirements.txt
          pip install .

      - name: Run reconforge
        run: |
          reconforge --version
          reconforge --list-categories
          reconforge --no-banner --check-deps || true
